stages:
  - test

.python_base:
  stage: test
  image: python:3.11
  variables:
    ALLURE_ENDPOINT: "https://testops.sport-express.ru"
    ALLURE_PROJECT_ID: "15"
    ALLURE_RESULTS: "allure-results"
    PYTHONUTF8: "1"
    PYTHONIOENCODING: "UTF-8"
    LANG: "C.UTF-8"
    LC_ALL: "C.UTF-8"
    PIP_DISABLE_PIP_VERSION_CHECK: "1"
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt

.python_ui_allure:
  extends: .python_base
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements.txt
    - python -m playwright install --with-deps chromium
    - curl -fsSL -o allurectl https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64
    - chmod +x allurectl

desktop_smoke_testops:
  extends: .python_ui_allure
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - when: never
  script:
    - rm -rf allure-results
    - ./allurectl watch -- python -m pytest -m "desktop and smoke" -v > allurectl-smoke.log 2>&1
    - cat allurectl-smoke.log
    - python scripts/validate_allure_results.py --mode smoke --results-dir allure-results
    - |
      if ! grep -Eqi 'https?://[^ ]+launch' allurectl-smoke.log; then
        echo "Allure launch URL was not found in smoke log."
        exit 1
      fi
  artifacts:
    when: always
    paths:
      - allure-results/
      - allurectl-smoke.log

desktop_regression_testops:
  extends: .python_ui_allure
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never
  script:
    - rm -rf allure-results
    - ./allurectl watch -- python -m pytest -m "desktop and regression" -v > allurectl-regression.log 2>&1
    - cat allurectl-regression.log
    - python scripts/validate_allure_results.py --mode regression --results-dir allure-results
    - |
      if ! grep -Eqi 'https?://[^ ]+launch' allurectl-regression.log; then
        echo "Allure launch URL was not found in regression log."
        exit 1
      fi
  artifacts:
    when: always
    paths:
      - allure-results/
      - allurectl-regression.log

http_health:
  extends: .python_base
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - when: never
  script:
    - |
      if [ "$CI_PIPELINE_SOURCE" = "schedule" ] || [ "$CI_PIPELINE_SOURCE" = "web" ]; then
        python -m pytest -m "http and regression" -v
      else
        python -m pytest -m "http and smoke" -v
      fi
